<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<style>
html, body {
    height: 100%;
    margin: 0;
}

 a{
    font-size: x-large;
 }


 body{
display: flex;
    flex-direction: column;
    /* 1. Un degradado simple de arriba a abajo */
    background: linear-gradient(180deg, 
                rgba(255, 255, 255, 1) 0%, 
                rgba(168, 206, 255, 1) 50%, 
                rgba(204, 192, 255, 0.671) 100%);
    
    /* 2. Evitamos que el degradado se repita si la página es larga */
    background-repeat: no-repeat;
    background-attachment: fixed;
 }

.container {
    flex: 1;
}

</style>

</head>
<body>

    <header class = "mb-5 shadow pt-5 pb-3">

        <div class = "ms-5">
            <h1>PooRank</h1>
        </div>

        <div class = "ms-5 row justify-content-end" style = "display: flex;">

          <div class="col-3"><a class="link-dark link-underline link-underline-opacity-0" href="./info.html">Inicio</a></div>
          <div class="col-3"><a class="link-primary link-underline link-underline-opacity-0" href="./index.html">Ver baños</a></div>
          <div class="col-3"><a class="link-dark link-underline link-underline-opacity-0" href="#">Contacto</a></div>

        </div>

    </header>

    <div class = "container">

    </div>

    <footer class="pt-5 pb-5">
        <div class="container">
            <p class="text-center">&copy; 2026 PooRank. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script>

        async function obtenerLocales(){
            let busca = await fetch("http://localhost:8000/api/mostrarLocales");
            let datos = await busca.json();

            for (let i = 0; i < datos.data.length; i++) {


            const pos = parseInt(datos.data[i].valoracion_positiva) || 0;
            const neg = parseInt(datos.data[i].valoracion_negativa) || 0;
            const total = pos + neg;
            const diferencia = pos - neg;

            let resultadoTexto = "";
            let colorTexto = "black"; // Color por defecto

            if (total === 0) {
                resultadoTexto = "Sin valoraciones aún";
            } 
            else if (pos === neg) {
                resultadoTexto = "Neutral";
                colorTexto = "orange";
            } 
            else if (diferencia > 0) {
                // Es positiva
                const ratio = pos / total;
                if (ratio >= 0.8 && total >= 5) {
                    resultadoTexto = "Muy buena";
                    colorTexto = "darkgreen";
                } 
                else {
                    resultadoTexto = "Buena";
                    colorTexto = "green";
                }
            } 
            else {
                // Es negativa
                const ratio = neg / total;
                if (ratio >= 0.8 && total >= 5) {
                    resultadoTexto = "Muy mala";
                    colorTexto = "darkred";
                } 
                else {
                    resultadoTexto = "Mala";
                    colorTexto = "red";
                }
            }


                let cards = document.createElement("div");
                // Eliminamos 'row' del contenedor principal para que la Card mantenga su forma
                cards.className = "card mb-5 shadow"; 
                cards.style.width = "70%";
                cards.style.margin = "0 auto"; // Para centrar la tarjeta en la pantalla
                cards.innerHTML = `
                  <div class="row g-0 align-items-center">
                    <div class="col-md-3">
                      <img src="${datos.data[i].imagen}" class="img-fluid rounded-start" alt="Imagen local">
                    </div>
                  
                    <div class="col-md-6">
                      <div class="card-body">
                        <div class="row align-items-center">
                          <div class="col-8">
                            <h5 class="card-title mb-0">${datos.data[i].nombre_local}</h5>
                          </div>
                          <div class="col-4 text-end">
                            <span style="color: ${colorTexto}; font-weight: bold;">Valoración: ${resultadoTexto}</span>
                          </div>
                        </div>
                        <hr> <p class="card-text mt-2">${datos.data[i].descripcion}</p>
                      </div>
                    </div>
                  
                    <div class="col-md-3 text-center">
                      <a href="#" class="btn btn-primary botonVerInformacion" id="${datos.data[i].id}">Ver información</a>
                    </div>
                  </div>
                `;

                let container = document.querySelector(".container");
                container.appendChild(cards);

            }

            let botones = document.querySelectorAll(".botonVerInformacion");
            for (let i = 0; i < botones.length; i++) {
                botones[i].addEventListener("click", verInfo);
            }
            console.log("botones " + botones.length);
            console.log(datos.data.length);
        }


        obtenerLocales()


        function verInfo(event){
            let nodoClick
            if(event){
                nodoClick = event.target;
                localStorage.setItem("id_local", nodoClick.id);
                window.location.href = "local.html";
            }
        }

    </script>
</body>
</html>
