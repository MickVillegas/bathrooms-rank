<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<style>
html, body {
    height: 100%;
    margin: 0;
}

 a{
    font-size: x-large;
 }

 body{
display: flex;
    flex-direction: column;
    /* 1. Un degradado simple de arriba a abajo */
    background: linear-gradient(180deg, 
                rgba(255, 255, 255, 1) 0%, 
                rgba(168, 206, 255, 1) 50%, 
                rgba(204, 192, 255, 0.671) 100%);
    
    /* 2. Evitamos que el degradado se repita si la página es larga */
    background-repeat: no-repeat;
    background-attachment: fixed;
 }

.container {
    flex: 1;
}

.datillos{
    background-color: rgba(255, 255, 255, 0.476);
}

</style>

</head>
<body>

    <header class = "mb-5 shadow pt-5 pb-3">

        <div class = "ms-5">
            <h1>PooRank</h1>
        </div>

        <div class = "ms-5 row justify-content-end" style = "display: flex;">

          <div class="col-3"><a class="link-dark link-underline link-underline-opacity-0" href="./info.html">Inicio</a></div>
          <div class="col-3"><a class="link-primary link-underline link-underline-opacity-0" href="./index.html">Ver baños</a></div>
          <div class="col-3"><a class="link-dark link-underline link-underline-opacity-0" href="#">Contacto</a></div>

        </div>

    </header>

    <div class="container">
        <h1 class="mb-3" id="nombreLocal"></h1>
        <br>
        <div class="row">
            <img class="col-6" src="./img/taco-bell@2x.jpg" alt="">

            <div class="col-2 offset-4 shadow pe-5 ps-5 pt-3 datillos">
                <p class="" id = "direccion"></p>
                <p class="" id = "Resenas"></p>
                <p class="" id = "Valoracion"></p>
            </div>
        </div>

        <h3 class="mb-3 mt-5">Descripción</h3>
        <p id="descripcion"></p>

        <hr>

        <h3 class="mb-3 mt-5">Deja tu opinión</h3>
        <br>
        <button id = "like" class="btn btn-outline-success" onclick="valoracionPositiva()">
            Positiva<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-hand-thumbs-up" viewBox="0 0 16 16">

            </svg>
        </button>

        <button id = "dislike" class="btn btn-outline-danger" onclick="valoracionNegativa()">
            Negativa<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-hand-thumbs-down" viewBox="0 0 16 16">
                <path d="M8.864 15.674c-.956.24-1.843-.484-1.908-1.42-.072-1.05-.23-2.015-.428-2.59-.125-.36-.479-1.012-1.04-1.638-.557-.624-1.282-1.179-2.131-1.41C2.685 8.432 2 7.85 2 7V3c0-.845.682-1.464 1.448-1.546 1.07-.113 1.564-.415 2.068-.723l.048-.029c.272-.166.578-.349.97-.484C6.931.08 7.395 0 8 0h3.5c.937 0 1.599.478 1.934 1.064.164.287.254.607.254.913 0 .152-.023.312-.077.464.201.262.38.577.488.9.11.33.172.762.004 1.15.069.13.12.268.159.403.077.27.113.567.113.856s-.036.586-.113.856c-.035.12-.08.244-.138.363.394.571.418 1.2.234 1.733-.206.592-.682 1.1-1.2 1.272-.847.283-1.803.276-2.516.211a10 10 0 0 1-.443-.05 9.36 9.36 0 0 1-.062 4.51c-.138.508-.55.848-1.012.964zM11.5 1H8c-.51 0-.863.068-1.14.163-.281.097-.506.229-.776.393l-.04.025c-.555.338-1.198.73-2.49.868-.333.035-.554.29-.554.55V7c0 .255.226.543.62.65 1.095.3 1.977.997 2.614 1.709.635.71 1.064 1.475 1.238 1.977.243.7.407 1.768.482 2.85.025.362.36.595.667.518l.262-.065c.16-.04.258-.144.288-.255a8.34 8.34 0 0 0-.145-4.726.5.5 0 0 1 .595-.643h.003l.014.004.058.013a9 9 0 0 0 1.036.157c.663.06 1.457.054 2.11-.163.175-.059.45-.301.57-.651.107-.308.087-.67-.266-1.021L12.793 7l.353-.354c.043-.042.105-.14.154-.315.048-.167.075-.37.075-.581s-.027-.414-.075-.581c-.05-.174-.111-.273-.154-.315l-.353-.354.353-.354c.047-.047.109-.176.005-.488a2.2 2.2 0 0 0-.505-.804l-.353-.354.353-.354c.006-.005.041-.05.041-.17a.9.9 0 0 0-.121-.415C12.4 1.272 12.063 1 11.5 1"/>
            </svg>
        </button>

        <br>
        <input class="mt-3 form-control" type="text" id="nombre" placeholder="Nombre y apellidos">
        <br>
        <textarea  class="mt-3 form-control" type="text" id="comentario" placeholder="Comentario" rows="3"></textarea>
        <button class="mt-3 mb-5 btn btn-primary" id="botonSubirComentario">Subir</button>

        

        <h3 class = "mt-5">Comentarios</h3>
        <hr class = "mb-5">

        <div class="mt-5">
            <div class = "comentariosNuevos"></div>
            <div class = "comentarios"></div>
        </div>

    </div>

    <footer class="pt-5 pb-5">
        <div class="container">
            <p class="text-center">&copy; 2026 PooRank. Todos los derechos reservados.</p>
        </div>
    </footer>
    
    <script>

        let valoracion;
        let nombreLocal;

        function valoracionPositiva() {

            document.getElementById("like").classList.remove("btn-outline-success");
            document.getElementById("like").classList.add("btn-success");
            valoracion = "positivo";
            document.getElementById("dislike").classList.remove("btn-danger");
            document.getElementById("dislike").classList.add("btn-outline-danger");

        }

        function valoracionNegativa() {

            document.getElementById("dislike").classList.remove("btn-outline-danger");
            document.getElementById("dislike").classList.add("btn-danger");
            valoracion = "negativo";
            document.getElementById("like").classList.remove("btn-success");
            document.getElementById("like").classList.add("btn-outline-success");

        }

        async function mostrarInfo() {

            let busca = await fetch("http://localhost:8000/api/mostrarUnLocal/" + localStorage.getItem("id_local"));
            let datos = await busca.json();

            document.getElementById("nombreLocal").textContent = datos.nombre_local;
            document.getElementById("descripcion").textContent = datos.descripcion;
            document.getElementById("direccion").textContent = "Dirección: " + datos.lugar;
            document.getElementById("Resenas").textContent = "Reseñas: ";

            const pos = parseInt(datos.valoracion_positiva) || 0;
            const neg = parseInt(datos.valoracion_negativa) || 0;
            const total = pos + neg;
            const diferencia = pos - neg;

            let resultadoTexto = "";
            let colorTexto = "black"; // Color por defecto

            if (total === 0) {
                resultadoTexto = "Sin valoraciones aún";
            } 
            else if (pos === neg) {
                resultadoTexto = "Neutral";
                colorTexto = "orange";
            } 
            else if (diferencia > 0) {
                // Es positiva
                const ratio = pos / total;
                if (ratio >= 0.8 && total >= 5) {
                    resultadoTexto = "Muy buena";
                    colorTexto = "darkgreen";
                } 
                else {
                    resultadoTexto = "Buena";
                    colorTexto = "green";
                }
            } 
            else {
                // Es negativa
                const ratio = neg / total;
                if (ratio >= 0.8 && total >= 5) {
                    resultadoTexto = "Muy mala";
                    colorTexto = "darkred";
                } 
                else {
                    resultadoTexto = "Mala";
                    colorTexto = "red";
                }
            }
        
            // 3. Mostrar el resultado en el HTML
            const spanValoracion = document.getElementById("Valoracion");
            spanValoracion.textContent = "Valoración general: " + resultadoTexto;
            spanValoracion.style.color = colorTexto;
            spanValoracion.style.fontWeight = "bold";

            nombreLocal = datos.nombre_local;

        }

        mostrarInfo()

        async function comentarios() {

            let buscar = await fetch("http://localhost:8000/api/mostrarComentarios/" + localStorage.getItem("id_local"));
            let datos = await buscar.json();

            document.getElementById("Resenas").textContent = "Reseñas: (" + datos.data.length + ")";

            if(buscar.status === 404){
                document.querySelector(".comentarios").innerHTML = '<center class = "mb-5"><h3>(No hay comentarios para este local)</h3></center>';
            }

            else{

                for (let i = 0; i < datos.data.length; i++) {

                    if(datos.data[i].valoracion_dada == "positivo"){

                        let comentario = document.createElement("div");
                        let hr = document.createElement("hr");
                        comentario.innerHTML = '<div class = "row"><div class = "col-6"><strong>'+ datos.data[i].nombre_usuario +'</strong></div><div class = "col-6 text-success"><strong>Valoración: '+ datos.data[i].valoracion_dada +'</strong></div></div><p>'+ datos.data[i].comentario +'</p>'
                        document.querySelector(".comentarios").appendChild(comentario);
                        document.querySelector(".comentarios").appendChild(hr);

                    }
                    else{

                        let comentario = document.createElement("div");
                        let hr = document.createElement("hr");
                        comentario.innerHTML = '<div class = "row"><div class = "col-6"><strong>'+ datos.data[i].nombre_usuario +'</strong></div><div class = "col-6 text-danger"><strong>Valoración: '+ datos.data[i].valoracion_dada +'</strong></div></div><p>'+ datos.data[i].comentario +'</p>'
                        document.querySelector(".comentarios").appendChild(comentario);
                        document.querySelector(".comentarios").appendChild(hr);

                    }

                }
            }
        }

        comentarios()

        async function subirComentario(){

            let seccionComentarios = document.querySelector(".comentariosNuevos");

            if(valoracion == "positivo"){
                await fetch("http://localhost:8000/api/unaValoracionPositiva/" + localStorage.getItem("id_local"), {
                    method: "PUT",
                    headers: {
                        "Content-type": "application/json"
                    }
                })
            }
            else{
                await fetch("http://localhost:8000/api/unaValoracionNegativa/" + localStorage.getItem("id_local"), {
                    method: "PUT",
                    headers: {
                        "Content-type": "application/json"
                    }
                })
            }

            let comentario = document.getElementById("comentario").value;
            let nombre = document.getElementById("nombre").value;

            if(valoracion == "positivo"){
                let comentarioEnFrontend = document.createElement("div");
                let hr = document.createElement("hr");
                comentarioEnFrontend.innerHTML = '<div class = "row"><div class = "col-6"><strong>'+ nombre +'</strong></div><div class = "col-6 text-success"><strong>Valoración: '+ valoracion +'</strong></div></div><p>'+ comentario +'</p>'
                seccionComentarios.appendChild(comentarioEnFrontend);
                seccionComentarios.appendChild(hr);
            }
            else{
                let comentarioEnFrontend = document.createElement("div");
                let hr = document.createElement("hr");
                comentarioEnFrontend.innerHTML = '<div class = "row"><div class = "col-6"><strong>'+ nombre +'</strong></div><div class = "col-6 text-danger"><strong>Valoración: '+ valoracion +'</strong></div></div><p>'+ comentario +'</p>'
                seccionComentarios.appendChild(comentarioEnFrontend);
                seccionComentarios.appendChild(hr);
            }


            const subirCXomentario = {
                nombre_local: nombreLocal,
                comentario: comentario,
                valoracion_dada: valoracion,
                nombre_usuario: nombre,
                id_local:localStorage.getItem("id_local")
            }
        
            const repositorio = await fetch ("http://localhost:8000/api/crearComentario" ,{
                method: "POST",
                body: JSON.stringify(subirCXomentario),
                headers: {
                    "Content-type": "application/json"
                }
            })
        }

        document.getElementById("botonSubirComentario").addEventListener("click", subirComentario);

    </script>

</body>
</html>
